packages:
  - 'apps/*'
  - 'packages/*'

# Cloud Build uses pnpm 11, which blocks packages published within 24h.
minimumReleaseAge: 0

allowBuilds:
  "@google/genai": true
  "@prisma/client": true
  "@prisma/engines": true
  "esbuild": true
  "msgpackr-extract": true
  "prisma": true
  "protobufjs": true
  "sharp": true

# pnpm 11 in Cloud Build fails install when transitive deps need build scripts.
strictDepBuilds: false


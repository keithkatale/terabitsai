# Google Cloud Buildpacks fallback — NOT used for production deploy.
# The GitHub trigger must use cloudbuild-web.yaml (Dockerfile). Buildpacks
# mis-detect this monorepo and produce images without Node.js in PATH.
[[build.env]]
name = "GOOGLE_NODE_RUN_SCRIPTS"
value = "build"

[[build.env]]
name = "GOOGLE_PACKAGE_MANAGER"
value = "npm"

[[build.env]]
name = "GOOGLE_NODEJS_VERSION"
value = "20"

[[build.env]]
name = "HOSTNAME"
value = "0.0.0.0"

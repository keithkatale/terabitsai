# Google Cloud Buildpacks — npm workspaces monorepo, Next.js standalone on Cloud Run
[[build.env]]
name = "GOOGLE_ENTRYPOINT"
value = "node apps/web/.next/standalone/apps/web/server.js"

[[build.env]]
name = "HOSTNAME"
value = "0.0.0.0"

# Build packages in dependency order before the web app
[[build.env]]
name = "GOOGLE_BUILD_COMMAND"
value = "npm run build"
